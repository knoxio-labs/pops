name: Inventory Quality

on:
  push:
    branches: [main]
    paths:
      - "packages/app-inventory/**"
      - "packages/ui/**"
      - "packages/db-types/**"
      - "packages/api-client/**"
      - ".github/workflows/inventory-quality.yml"
  pull_request:

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            relevant:
              - 'packages/app-inventory/**'
              - 'packages/ui/**'
              - 'packages/db-types/**'
              - 'packages/api-client/**'
              - '.github/workflows/inventory-quality.yml'

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [changes]
    if: always()
    steps:
      - name: "Skip — no relevant changes"
        if: github.event_name == 'pull_request' && needs.changes.outputs.relevant != 'true'
        run: echo "Skipping — no inventory changes"
      - uses: actions/checkout@v6
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
      - uses: pnpm/action-setup@v5
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
      - uses: actions/setup-node@v6
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
      - run: cd packages/app-inventory && pnpm lint
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    needs: [changes]
    if: always()
    steps:
      - name: "Skip — no relevant changes"
        if: github.event_name == 'pull_request' && needs.changes.outputs.relevant != 'true'
        run: echo "Skipping — no inventory changes"
      - uses: actions/checkout@v6
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
      - uses: pnpm/action-setup@v5
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
      - uses: actions/setup-node@v6
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
      - run: pnpm --filter @pops/db-types build
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
      - run: cd packages/app-inventory && pnpm typecheck
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [changes]
    if: always()
    steps:
      - name: "Skip — no relevant changes"
        if: github.event_name == 'pull_request' && needs.changes.outputs.relevant != 'true'
        run: echo "Skipping — no inventory changes"
      - uses: actions/checkout@v6
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
      - uses: pnpm/action-setup@v5
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
      - uses: actions/setup-node@v6
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
      - run: pnpm --filter @pops/db-types build
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
      - run: cd packages/app-inventory && pnpm test
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
