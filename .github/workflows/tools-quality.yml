name: Tools Quality

on:
  push:
    branches: [main]
    paths:
      - "packages/import-tools/**"
      - ".github/workflows/tools-quality.yml"
  pull_request:

defaults:
  run:
    working-directory: packages/import-tools

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            relevant:
              - 'packages/import-tools/**'
              - '.github/workflows/tools-quality.yml'

  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    needs: [changes]
    if: always()
    timeout-minutes: 10

    steps:
      - name: "Skip — no relevant changes"
        if: github.event_name == 'pull_request' && needs.changes.outputs.relevant != 'true'
        run: echo "Skipping — no import-tools changes"

      - name: Checkout repository
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        uses: actions/checkout@v6

      - name: Install pnpm
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        working-directory: .
        run: pnpm install --frozen-lockfile

      - name: Type check
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        run: pnpm typecheck

      - name: Lint
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        run: pnpm lint

      - name: Format check
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        run: pnpm format

      - name: Run tests
        if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
        run: pnpm test
